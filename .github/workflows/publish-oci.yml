# Parallel build + atomic batch publish of gRPC CL wrapper as an OCI package
# with platform-specific native library overlays.
name: Publish OCI Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (default: from tag)"
        required: false
        default: ""
      registry:
        description: "OCI registry (default: ghcr.io)"
        required: false
        default: ""

env:
  DEFAULT_REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            lib: grpc.so
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm64
            lib: grpc.so
          - os: darwin
            arch: arm64
            runner: macos-latest
            lib: grpc.dylib

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew (Linux)
        if: matrix.os == 'linux'
        uses: Homebrew/actions/setup-homebrew@master

      - name: Add Homebrew to environment (Linux)
        if: matrix.os == 'linux'
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          BREW_PREFIX="/home/linuxbrew/.linuxbrew"
          {
            echo "HOMEBREW_PREFIX=${BREW_PREFIX}"
            echo "HOMEBREW_CELLAR=${BREW_PREFIX}/Cellar"
            echo "HOMEBREW_REPOSITORY=${BREW_PREFIX}/Homebrew"
            echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/share/pkgconfig"
            echo "CPATH=${BREW_PREFIX}/include"
            echo "LIBRARY_PATH=${BREW_PREFIX}/lib"
            echo "LD_LIBRARY_PATH=${BREW_PREFIX}/lib"
          } >> "$GITHUB_ENV"

      - name: Install gRPC dev libraries (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential pkg-config
          brew install grpc

      - name: Install gRPC dev libraries (macOS)
        if: matrix.os == 'darwin'
        run: brew install grpc pkg-config

      - name: Build native wrapper
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Bundle gRPC C++ runtime (Homebrew-linked .so/.dylib)
        run: |
          mkdir -p native-bundle
          chmod +x scripts/bundle-grpc-native-deps.sh
          ./scripts/bundle-grpc-native-deps.sh "${{ matrix.lib }}" native-bundle

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}-${{ matrix.arch }}
          path: native-bundle/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts/

      - name: Arrange overlay directories
        run: |
          for dir in native-artifacts/native-*; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir" | sed 's/^native-//')
            os=$(echo "$slug" | cut -d- -f1)
            arch=$(echo "$slug" | cut -d- -f2)
            target="lib/${os}-${arch}"
            mkdir -p "$target"
            cp "$dir"/* "$target/"
            echo "${os}/${arch}" >> /tmp/platforms.txt
          done
          echo "Platforms:"; cat /tmp/platforms.txt
          find lib/ -type f

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install Quicklisp
        run: |
          curl -o /tmp/quicklisp.lisp https://beta.quicklisp.org/quicklisp.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path #p"~/quicklisp/")'
          sbcl --noinform --non-interactive \
            --load ~/quicklisp/setup.lisp \
            --eval '(ql-util:without-prompting (ql:add-to-init-file))'

      # setup-oras@v1 bundles a fixed release manifest: 1.3.1+ is not listed yet; default 1.3.0 linux_arm64
      # sometimes 404 in act. 1.2.3 is in the manifest with linux_arm64 checksums.
      - name: Install oras
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.3

      - name: Pull cl-repository-packager from GHCR
        run: |
          CL_REPO_TAG="0.8.0"
          CL_REPO_IMAGE="ghcr.io/egao1980/cl-repository/cl-repository-packager"
          rm -rf /tmp/cl-repo-pull
          mkdir -p /tmp/cl-repo-pull ~/.local/share/cl-systems
          rm -rf ~/.local/share/cl-systems/cl-oci-*
          oras pull "${CL_REPO_IMAGE}:${CL_REPO_TAG}" -o /tmp/cl-repo-pull/
          for f in /tmp/cl-repo-pull/*.tar.gz; do
            tar -xzf "$f" -C ~/.local/share/cl-systems/
          done

      - name: Build and publish OCI package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${{ inputs.registry || env.DEFAULT_REGISTRY }}"
          VERSION="${{ inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE="${{ github.repository_owner }}/cl-systems"
          NAMESPACE=$(echo "$NAMESPACE" | tr '[:upper:]' '[:lower:]')

          if [ "$REGISTRY" = "ghcr.io" ]; then
            REGISTRY_URL="https://${REGISTRY}"
          else
            REGISTRY_URL="http://${REGISTRY}"
          fi

          cat > /tmp/publish.lisp <<'LISP'
          (require :asdf)
          (asdf:initialize-source-registry
            '(:source-registry
              (:tree (:home ".local/share/cl-systems/"))
              :inherit-configuration))
          (load (merge-pathnames "quicklisp/setup.lisp" (user-homedir-pathname)))
          (ql:quickload :cl-repository-packager)

          (let* ((version (uiop:getenv "PKG_VERSION"))
                 (registry-url (uiop:getenv "REGISTRY_URL"))
                 (namespace (uiop:getenv "OCI_NAMESPACE"))
                 (use-auth (string= "ghcr.io" (uiop:getenv "OCI_REGISTRY")))
                 (auth (when use-auth
                         (cl-oci-client/auth:make-auth-config
                           :username (uiop:getenv "GITHUB_ACTOR")
                           :password (uiop:getenv "GITHUB_TOKEN"))))
                 (reg (if use-auth
                         (cl-oci-client/registry:make-registry registry-url :auth auth)
                         (cl-oci-client/registry:make-registry registry-url)))
                 (platform-lines (uiop:read-file-lines "/tmp/platforms.txt"))
                 (overlays
                   (loop for line in platform-lines
                         for slash = (position #\/ line)
                         when slash
                         collect
                         (let* ((os (subseq line 0 slash))
                                (arch (subseq line (1+ slash)))
                                (prefix (format nil "~a-~a" os arch))
                                (lib-dir (uiop:ensure-directory-pathname
                                          (merge-pathnames (format nil "lib/~a/" prefix)
                                                           (uiop:getcwd))))
                                (native-files
                                  (loop for p in (directory (merge-pathnames #p"*" lib-dir))
                                        unless (uiop:directory-pathname-p p)
                                        collect (cons (namestring p) (file-namestring p)))))
                           (make-instance 'cl-repository-packager/build-matrix:overlay-spec
                             :os os :arch arch
                             :layers
                             (list
                               (list :role "native-library"
                                     :files native-files))))))
                 (spec (make-instance 'cl-repository-packager/build-matrix:package-spec
                         :name "grpc"
                         :version version
                         :source-dir (uiop:getcwd)
                         :license "MIT"
                         :description "Common Lisp gRPC client/server library (CFFI wrapper)"
                         :depends-on '("cl-protobufs" "cffi" "bordeaux-threads")
                         :provides '("grpc")
                         :cffi-libraries '("grpc-client-wrapper")
                         :overlays overlays))
                 (result (cl-repository-packager/build-matrix:build-package spec)))
            (format t "~%Overlays: ~{~a~^, ~}~%" platform-lines)
            (cl-repository-packager/publisher:publish-package
              reg namespace version result spec)
            (format t "Published grpc:~a to ~a/~a~%" version registry-url namespace))
          LISP

          PKG_VERSION="$VERSION" \
          OCI_REGISTRY="$REGISTRY" \
          REGISTRY_URL="$REGISTRY_URL" \
          GITHUB_ACTOR="${{ github.actor }}" \
          OCI_NAMESPACE="$NAMESPACE" \
          sbcl --noinform --non-interactive --load /tmp/publish.lisp

      - name: Verify published artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${{ inputs.registry || env.DEFAULT_REGISTRY }}"
          VERSION="${{ inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          NAMESPACE="${{ github.repository_owner }}/cl-systems"
          NAMESPACE=$(echo "$NAMESPACE" | tr '[:upper:]' '[:lower:]')
          if [ "$REGISTRY" = "ghcr.io" ]; then
            oras manifest fetch "${REGISTRY}/${NAMESPACE}/grpc:${VERSION}" \
              --registry-config <(echo "{\"auths\":{\"ghcr.io\":{\"username\":\"${{ github.actor }}\",\"password\":\"${GITHUB_TOKEN}\"}}}")
          else
            oras manifest fetch "${REGISTRY}/${NAMESPACE}/grpc:${VERSION}" --insecure --plain-http
          fi
